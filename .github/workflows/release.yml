name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Cross compile
        run: make cross

      - name: Prepare release assets
        run: |
          mkdir -p release
          cd _out
          for os_dir in */; do
            os_name=$(basename "$os_dir")
            for arch_dir in "$os_dir"*/; do
              arch_name=$(basename "$arch_dir")
              asset_name="cspawn-${os_name}-${arch_name}"
              cp "${arch_dir}cspawn" "../release/${asset_name}"
              chmod +x "../release/${asset_name}"
            done
          done
          cd ..
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            release/cspawn-*
            release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

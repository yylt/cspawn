# Nginx web server - Nginx Web 服务器示例
# 使用方式: cspawn -f nginx.yaml /usr/sbin/nginx -g 'daemon off;'

runtime: local:///var/lib/cspawn
image: nginx:alpine

# 环境变量
env:
  - NGINX_HOST=localhost
  - NGINX_PORT=80

# 绑定挂载
binds:
  - /var/www/html:/usr/share/nginx/html:ro
  - /etc/nginx/conf.d:/etc/nginx/conf.d:ro
  - /var/log/nginx:/var/log/nginx:rw

# 工作目录 (使用 overlay)
work_dir: /var/lib/cspawn/workdirs/nginx

# 调试模式
debug: false
